<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StockMaster - LA BARRICA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="onLoad()">

    <header class="main-nav-container">
        <div class="software-titles">
            <h1>StockMaster</h1>
            <h2>LA BARRICA</h2>
        </div>
        <nav class="f-keys-grid">
            <button class="nav-item">Articulos [F1]</button>
            <button class="nav-item">Proveedores [F2]</button>
            <button class="nav-item">Clientes [F3]</button>
            <button class="nav-item active">Ventas [F6]</button>
            <button class="nav-item">AFIP [F10]</button>
            <button class="nav-item exit">Salir [F12]</button>
        </nav>
    </header>

    <main class="content-wrapper">
        <section class="dark-panel sale-header-info">
            <div class="panel-label">DATOS DE LA VENTA</div>
            <div class="grid-form-layout">
                <div class="input-block">
                    <label>Cliente</label>
                    <input type="text" value="CONSUMIDOR FINAL" readonly>
                </div>
                <div class="input-block">
                    <label>Tipo de Comprobante</label>
                    <select><option>FACTURA B</option></select>
                </div>
                <div class="input-block">
                    <label>N° Venta</label>
                    <span class="val-destacado">9243</span>
                </div>
                <div class="input-block">
                    <label>Tipo de Pago</label>
                    <select><option>CONTADO</option></select>
                </div>
                <div class="input-block">
                    <label>Fecha</label>
                    <input type="text" value="Sabado, 4 de Abril de 2026" readonly>
                </div>
            </div>
        </section>

        <section class="dark-panel products-table-container">
            <table id="ventas-grid">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Cantidad</th>
                        <th>Detalle</th>
                        <th>Precio U.</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="grid-body">
                    </tbody>
            </table>
        </section>
    </main>

    <footer class="tech-footer">
        <div class="scanner-section">
            <input type="text" id="barcode-input" placeholder="Escanee producto..." autofocus>
            <div class="action-buttons-row">
                <button class="btn-f">Guardar [F2]</button>
                <button class="btn-f cancel">Cancelar [F5]</button>
                <button class="btn-f">Imprimir [F8]</button>
            </div>
        </div>

        <div class="totals-section">
            <div class="breakdown">
                <p>SubTotal: <span>$0.00</span></p>
                <p>IVA 21%: <span id="txt-iva21">$0.00</span></p>
            </div>
            <div class="massive-total">
                <small>TOTAL</small>
                <span id="txt-total">$0.00</span>
            </div>
        </div>
    </footer>

    <script src="renderer.js"></script>
</body>
</html>
