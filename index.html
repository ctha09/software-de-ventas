<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA BARRICA - Punto de Venta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #38bdf8;
            --text-light: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
        }

        /* Toolbar Superior */
        .toolbar {
            background: rgba(15, 23, 42, 0.9);
            padding: 1rem;
            display: flex;
            gap: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .tool-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .tool-btn:hover { background: rgba(255,255,255,0.1); }
        .icon-blue { color: var(--accent-blue); }

        /* Escritorio Central */
        .desktop-area {
            height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, rgba(15,23,42,1) 70%);
        }

        .brand-text { font-size: 4rem; font-weight: 800; letter-spacing: -2px; margin: 0; }
        .brand-text span { color: var(--accent-blue); }

        /* Estilo Ventana de Ventas */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .modal-window {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            width: 95%; max-width: 1100px;
            padding: 20px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: rgba(255,255,255,0.05); padding: 12px; text-align: left; color: var(--accent-blue); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .barcode-input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 2px solid var(--accent-blue);
            border-radius: 8px;
            color: var(--accent-blue);
            font-size: 1.8rem;
            font-family: monospace;
            margin-top: 10px;
        }

        .total-box {
            background: var(--accent-blue);
            color: #000;
            padding: 20px;
            border-radius: 8px;
            text-align: right;
            margin-top: 20px;
        }

        .total-amount { font-size: 3rem; font-weight: 900; }
    </style>
</head>
<body>

    <header class="toolbar">
        <button class="tool-btn" onclick="abrirVentas()">
            <i class="fas fa-cash-register icon-blue"></i>
            <span>Ventas [F6]</span>
        </button>
        <button class="tool-btn">
            <i class="fas fa-boxes"></i>
            <span>Stock</span>
        </button>
    </header>

    <main class="desktop-area">
        <h1 class="brand-text">LA<span>BARRICA</span></h1>
        <p style="opacity: 0.6;">Terminal de Gestión</p>
    </main>

    <div id="modal-ventas" class="modal-overlay">
        <div class="modal-window">
            <div style="display:flex; justify-content: space-between;">
                <h2>CAJA DE COBRO</h2>
                <button onclick="cerrarVentas()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
            </div>
            
            <div style="max-height: 400px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Descripción</th>
                            <th>Cant/Peso</th>
                            <th>Precio</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="lista-ventas-items"></tbody>
                </table>
            </div>

            <div style="margin-top: 20px;">
                <label>ESCANEAR PRODUCTO:</label>
                <input type="text" id="lector-barras" class="barcode-input" onkeydown="manejarLector(event)" placeholder="Esperando lectura..." autofocus>
            </div>

            <div class="total-box">
                <div style="font-weight: bold;">TOTAL GENERAL</div>
                <div class="total-amount" id="total-final">$ 0.00</div>
            </div>

            <button onclick="guardarVentaFirebase()" style="width:100%; padding:15px; background:#22c55e; border:none; color:white; font-weight:bold; margin-top:10px; border-radius:8px; cursor:pointer;">
                CONFIRMAR VENTA [F2]
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Estas son tus credenciales de la captura de pantalla
        const firebaseConfig = {
            apiKey: "AIzaSyB0a2iMWw5O4BxyssWe5Bp0wCXou9I1YMc",
            authDomain: "software-b7f1a.firebaseapp.com",
            projectId: "software-b7f1a",
            storageBucket: "software-b7f1a.firebasestorage.app",
            messagingSenderId: "457724276762",
            appId: "1:457724276762:web:bffb9b54ce4d96f2ab61a3"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Exportar a global para que script.js pueda usarlos
        window.db = db;
        window.fs = { collection, addDoc, getDocs };

        console.log("✅ Firebase conectado con éxito");
    </script>

    <script src="script.js"></script>
</body>
</html>
