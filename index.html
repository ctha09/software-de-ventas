<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StockMaster V.24.09.24</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="onLoad()">

    <header class="main-nav">
        <div class="logo">StockMaster</div>
        <nav class="f-keys-menu">
            <button class="nav-item"><span>Articulos</span> <small>[F1]</small></button>
            <button class="nav-item"><span>Proveedores</span> <small>[F2]</small></button>
            <button class="nav-item"><span>Clientes</span> <small>[F3]</small></button>
            <button class="nav-item"><span>Usuarios</span> <small>[F4]</small></button>
            <button class="nav-item active"><span>Ventas</span> <small>[F6]</small></button>
            <button class="nav-item"><span>AFIP</span> <small>[F10]</small></button>
            <button class="nav-item exit"><span>Salir</span> <small>[F12]</small></button>
        </nav>
    </header>

    <main class="content">
        
        <section class="glass-panel sale-data">
            <div class="panel-header">DATOS DE LA VENTA</div>
            <div class="panel-content grid-forms">
                <div class="input-group">
                    <label>Cliente</label>
                    <input type="text" value="CONSUMIDOR FINAL" readonly>
                    <button class="btn-icon">🔍</button>
                </div>
                <div class="input-group">
                    <label>Tipo de Comprobante</label>
                    <select>
                        <option>FACTURA B</option>
                        <option>FACTURA C</option>
                        <option>REMITO X</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Tipo de Pago</label>
                    <select>
                        <option>CONTADO</option>
                        <option>TARJETA</option>
                        <option>C. CORRIENTE</option>
                    </select>
                </div>
                <div class="input-group info-read-only">
                    <label>N° Venta</label>
                    <span id="txt-nventa">9243</span>
                </div>
            </div>
        </section>

        <section class="glass-panel products-table">
            <table id="ventas-grid">
                <thead>
                    <tr>
                        <th style="width: 15%">Código</th>
                        <th style="width: 50%">Descripción</th>
                        <th style="width: 10%">Cant.</th>
                        <th style="width: 15%">Precio U.</th>
                        <th style="width: 10%">Total</th>
                    </tr>
                </thead>
                <tbody id="grid-body">
                    </tbody>
            </table>
        </section>

        <footer class="glass-footer">
            
            <div class="scanner-zone">
                <div class="modern-input-wrapper barcode-focus">
                    <input type="text" id="barcode-input" placeholder="Escanee producto... [Codigo o Nombre]" autofocus>
                </div>
                <div class="action-buttons-list">
                    <button class="btn-action">Guardar [F2]</button>
                    <button class="btn-action cancel">Cancelar [F5]</button>
                    <button class="btn-action">Imprimir [F8]</button>
                </div>
            </div>

            <div class="totales-zone">
                <div class="totales-breakdown">
                    <div>SUBTOTAL: <span>$0.00</span></div>
                    <div>IVA 21%: <span id="txt-iva21">$0.00</span></div>
                </div>
                <div class="main-total-panel">
                    <label>TOTAL:</label>
                    <span id="txt-total">$0.00</span>
                </div>
            </div>

        </footer>

        <div class="status-bar">
            <span>VP Sistemas & Servicios</span>
            <span id="txt-fecha-hora">Sabado, 4 de Abril de 2026</span>
        </div>

    </main>

    <script src="renderer.js"></script>
</body>
</html>
